# ==============================================
# YNM SAFETY - CI PIPELINE
# Runs on every push and PR to validate the project
# ==============================================

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────
  # Install & Cache Dependencies
  # ───────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: site/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}

  # ───────────────────────────────────────────────
  # Lint
  # ───────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: site/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}

      - name: Run ESLint
        working-directory: site
        run: npm run lint

  # ───────────────────────────────────────────────
  # Production Build
  # ───────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: site/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}

      - name: Build
        working-directory: site
        run: npm run build

      - name: Verify standalone output
        run: |
          if [ ! -f site/.next/standalone/server.js ]; then
            echo "::error::Standalone build output missing (server.js not found)"
            exit 1
          fi
          echo "Standalone build verified"

  # ───────────────────────────────────────────────
  # Security Checks
  # ───────────────────────────────────────────────
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .env is gitignored
        run: |
          if git check-ignore site/.env > /dev/null 2>&1; then
            echo "site/.env is properly gitignored"
          else
            echo "::error::site/.env is NOT gitignored"
            exit 1
          fi

      - name: Check no sensitive env files are tracked
        run: |
          TRACKED=$(git ls-files | grep '\.env' | grep -v '\.env\.example' | grep -v '\.env\.gcp\.example' || true)
          if [ -n "$TRACKED" ]; then
            echo "::error::Sensitive .env files are tracked in git:"
            echo "$TRACKED"
            exit 1
          fi
          echo "No sensitive .env files tracked"

      - name: Check no credentials or key files are tracked
        run: |
          CREDS=$(git ls-files | grep -E '\.(pem|key|p12|pfx)$|credentials.*\.json|service-account.*\.json' || true)
          if [ -n "$CREDS" ]; then
            echo "::error::Credential/key files are tracked in git:"
            echo "$CREDS"
            exit 1
          fi
          echo "No credential files tracked"

      - name: Check for large files (> 5MB)
        run: |
          LARGE=$(git ls-files | while read f; do
            SIZE=$(stat --format=%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 5242880 ]; then
              echo "$f ($(( SIZE / 1024 / 1024 ))MB)"
            fi
          done)
          if [ -n "$LARGE" ]; then
            echo "::warning::Large files detected (> 5MB):"
            echo "$LARGE"
          else
            echo "No large files detected"
          fi

  # ───────────────────────────────────────────────
  # Docker Build
  # ───────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: site
          push: false
          tags: ynm-website:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GA_ID=
